---
- name: Déploiement d'un Registry Docker Sécurisé
  hosts: registry_hosts
  become: true
  vars:
    project_dir: "/home/ubuntu/registry-stack"
    # On récupère l'IP publique automatiquement via les facts Ansible
    public_ip: "{{ ansible_host }}"

  tasks:
    # ----------------------------------------------------------
    # 1. INSTALLATION DES DÉPENDANCES
    # ----------------------------------------------------------
    - name: Installation des paquets
      apt:
        update_cache: yes
        name:
          - docker.io
          - docker-compose-v2
          - apache2-utils  # Pour htpasswd
          - python3-passlib
        state: present

    - name: Ajout de l'utilisateur ubuntu au groupe docker
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Création des dossiers
      file:
        path: "{{ item }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'
      loop:
        - "{{ project_dir }}"
        - "{{ project_dir }}/auth"
        - "{{ project_dir }}/data"

    # ----------------------------------------------------------
    # 3. AUTH (MOT DE PASSE)
    # ----------------------------------------------------------
    - name: Génération mot de passe (admin/admin123)
      htpasswd:
        path: "{{ project_dir }}/auth/registry.password"
        name: admin
        password: admin123
        owner: ubuntu
        group: ubuntu
        mode: 0640
        crypt_scheme: bcrypt

    - name: Copie du docker-compose.yml
      template:
        src: docker-compose.yml
        dest: "{{ project_dir }}/docker-compose.yml"
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Stop stack
      command: docker compose stop
      args:
        chdir: "{{ project_dir }}"

    # 5. Start
    - name: Démarrage de la stack
      command: docker compose up --force-recreate -d
      args:
        chdir: "{{ project_dir }}"

    - name: Récupération du statut des conteneurs
      command: docker compose ps
      args:
        chdir: "{{ project_dir }}"
      register: compose_ps_output

    - name: Affichage du statut final dans la console
      debug:
        msg: "{{ compose_ps_output.stdout_lines }}"
