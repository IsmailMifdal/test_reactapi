events {}

http {
    # Backends internes (noms de services Docker Compose, reseau interne)
    upstream docker-registry {
        server registry:5000;
    }
    upstream docker-ui {
        server ui:80;
    }

    # Injection d'identifiants UNIQUEMENT pour les lectures sans auth (GET/HEAD) :
    #  - navigateur/UI (GET /v2/_catalog sans auth) -> on injecte admin -> l'UI liste les images
    #  - Docker push (PUT/POST/PATCH) sans auth      -> pas d'injection -> registry renvoie 401 (push protege)
    #  - client deja authentifie (Docker login)      -> on laisse passer ses identifiants tels quels
    map "$request_method:$http_authorization" $injected_auth {
        "~^(GET|HEAD):$"  "Basic YWRtaW46YWRtaW4xMjM=";  # admin:admin123
        default           $http_authorization;
    }

    # Redirection HTTP -> HTTPS (port 80 garde uniquement pour ca)
    server {
        listen 80;
        server_name {{ public_ip }};
        return 301 https://$host$request_uri;
    }

    # Reverse proxy HTTPS avec certificat auto-signe
    server {
        listen 443 ssl;
        server_name {{ public_ip }};

        ssl_certificate     /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;

        # Requis par le Docker Registry (push de gros layers)
        client_max_body_size 0;
        chunked_transfer_encoding on;

        # Routage intelligent : l'API Registry (/v2/) vers registry:5000
        location /v2/ {
            proxy_pass         http://docker-registry;
            proxy_set_header   Authorization     $injected_auth;
            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 900;
        }

        # Tout le reste vers l'interface web ui:80 (aucun login requis)
        location / {
            proxy_pass         http://docker-ui;
            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
