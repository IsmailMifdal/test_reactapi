events {}

http {
    # Backends internes (noms de services Docker Compose, reseau interne)
    upstream docker-registry {
        server registry:5000;
    }
    upstream docker-ui {
        server ui:80;
    }

    # Redirection HTTP -> HTTPS (port 80 garde uniquement pour ca)
    server {
        listen 80;
        server_name {{ public_ip }};
        return 301 https://$host$request_uri;
    }

    # Reverse proxy HTTPS avec certificat auto-signe
    server {
        listen 443 ssl;
        server_name {{ public_ip }};

        ssl_certificate     /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;

        # Requis par le Docker Registry (push de gros layers)
        client_max_body_size 0;
        chunked_transfer_encoding on;

        # Routage intelligent : l'API Registry (/v2/) vers registry:5000
        location /v2/ {
            proxy_pass         http://docker-registry;
            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 900;
        }

        # Tout le reste vers l'interface web ui:80
        # auth_basic ici force le navigateur a se connecter des l'ouverture de la
        # page : il memorise alors les identifiants et les renvoie aussi vers /v2/,
        # ce qui permet a l'UI de lister les images. (Docker n'est pas impacte :
        # /v2/ n'a pas d'auth nginx, seul le registry l'authentifie.)
        location / {
            auth_basic           "Registry Realm";
            auth_basic_user_file /etc/nginx/auth/nginx.htpasswd;

            proxy_pass         http://docker-ui;
            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
