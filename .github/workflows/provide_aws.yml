name: Terraform Provide AWS

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.15.6
      - name: Terraform Init
        working-directory: ./registry
        run: terraform init -input=false
      - name: Terraform Plan
        working-directory: ./registry
        run: terraform plan -input=false
      # Apply retire volontairement : pipeline en lecture seule (init + plan).
      # Pour activer le deploiement automatise, il faudra un backend distant (S3)
      # afin que la CI partage l'etat Terraform avec la machine locale.
