name: Build and Test React Application


# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build_test:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Vous pouvez garder 20.x ici pour VOTRE code si votre projet React le nécessite, 
        # ou passer à 22.x/24.x si vous souhaitez mettre à jour votre projet.
        node-version: [24.x]

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          
      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Generate JSDoc documentation
        run: npm run jsdoc

      - name: Build production bundle
        run: npm run build

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV }}

      - name: build and publish package on NPM
        run: |
          git config --global user.email "juputepix5@gmail.com"
          git config --global user.name "ZomboyTepix"
          npm run build-npm-ci
          npm version patch
          npm publish
          git add .
          git commit -m "updated version"
          git push
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: build

  # Deploy job
  deploy:
    # Add a dependency to the build job
    needs: build_test
    runs-on: ubuntu-latest
    
    # Grant GITHUB_TOKEN the permissions required to make a page deployment
    permissions:
      pages: write
      id-token: write
      
    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    # Specify runner + deployment step
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
     
