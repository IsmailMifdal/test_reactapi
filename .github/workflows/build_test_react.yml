name: CI/CD - Build, Test, Cypress, Docker & Vercel


# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build_test:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Vous pouvez garder 20.x ici pour VOTRE code si votre projet React le nécessite, 
        # ou passer à 22.x/24.x si vous souhaitez mettre à jour votre projet.
        node-version: [24.x]

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          
      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Generate JSDoc documentation
        run: npm run jsdoc

      - name: Build production bundle
        run: npm run build
        env:
          # URL du backend Vercel — injectée dans le JS compilé pour GitHub Pages
          REACT_APP_API_URL: ${{ secrets.VERCEL_BACKEND_URL }}

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV }}

      - name: Setup Node.js for NPM publish
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://registry.npmjs.org'

      - name: build and publish package on NPM
        run: |
         
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          NPM_VERSION=$(npm view react_julio version 2>/dev/null || echo "0.0.0")
          echo "Version locale    : $LOCAL_VERSION"
          echo "Version sur NPM   : $NPM_VERSION"
          if [ "$LOCAL_VERSION" != "$NPM_VERSION" ]; then
            echo "Nouvelle version détectée → publication de $LOCAL_VERSION..."
            npm run build-npm-ci
            npm publish
          else
            echo "Version $LOCAL_VERSION déjà publiée sur NPM → publication ignorée."
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: build

  # Job dédié aux tests end-to-end Cypress (online + offline)
  cypress:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Cypress run (Online mode)
        uses: cypress-io/github-action@v6
        with:
          install: false          # npm ci déjà fait ci-dessus
          build: npm run build
          start: npm start
        env:
          # Le frontend appelle le backend Vercel de production en mode online
          REACT_APP_API_URL: ${{ secrets.VERCEL_BACKEND_URL }}

      - name: Clean build cache before offline run
        run: rm -rf node_modules/.cache

      - name: Run Cypress tests (Offline mode)
        uses: cypress-io/github-action@v6
        with:
          install: false          # npm ci déjà fait, cache nettoyé ci-dessus
          start: npm start
        env:
          CYPRESS_offline: true
          REACT_APP_API_URL: http://localhost:8000

      - name: Upload Cypress screenshots (en cas d'echec)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

      - name: Upload Cypress videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos
          if-no-files-found: ignore

  # Deploy job
  deploy:
    # Add a dependency to the build job
    needs: build_test
    runs-on: ubuntu-latest
    
    # Grant GITHUB_TOKEN the permissions required to make a page deployment
    permissions:
      pages: write
      id-token: write
      
    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    # Specify runner + deployment step
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
     
  build-docker:
    needs: build_test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/backend -f Dockerfile .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend

      - name: Build and push frontend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend -f React/Dockerfile .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend

  test-docker:
    needs: build-docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file from secrets
        run: |
          echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
          echo "MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}"           >> .env
          echo "MYSQL_USER=${{ secrets.MYSQL_USER }}"                   >> .env
          echo "MYSQL_HOST=db"                                          >> .env
          echo "REACT_APP_API_URL=http://localhost:8000"                >> .env

      - name: Start all services
        run: docker compose up -d

      - name: List running containers
        run: docker ps

      - name: Wait for services to be healthy
        run: sleep 10

      - name: Check db health
        run: |
          docker inspect --format "{{json .State.Health.Status }}" test_react-db-1 \
            | jq '. == "healthy"'

      - name: Check adminer health
        run: |
          docker inspect --format "{{json .State.Health.Status }}" test_react-adminer-1 \
            | jq '. == "healthy"'

      - name: Check server health
        run: |
          docker inspect --format "{{json .State.Health.Status }}" test_react-server-1 \
            | jq '. == "healthy"'

      - name: Check react health
        run: |
          docker inspect --format "{{json .State.Health.Status }}" test_react-react-1 \
            | jq '. == "healthy"'

  # Déploiement Vercel (backend FastAPI) — fusionné depuis production.yml
  vercel-deploy:
    needs: [build_test, cypress]
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      # uv est requis par @vercel/python pour builder le backend FastAPI
      - name: Install uv (Python package manager required by Vercel)
        uses: astral-sh/setup-uv@v5

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
